<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Währungsumrechner</title>
    <style>
        body 
        {
            font-family: Arial;
            background-color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .umrechnung 
        {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }
        h1 
        {
            margin-top: 0;
            color: #333;
        }
        input 
        {
            padding: 8px;
            margin-bottom: 10px;
            width: 200px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        select 
        {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button 
        {
            padding: 8px 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover 
        {
            background-color: #0056b3;
        }
        #ergebnis 
        {
            font-weight: bold;
            color: #007bff;
        }
    </style>    
</head>
<body>
    <div class="umrechnung">
        <h1>Währungsumrechner</h1>
        <form>
            <input type="number" id="betrag" placeholder="Gib den EURO-Betrag ein">
            <select id="waehrungen">
                <option value="USD">USD - US Dollar</option>
                <option value="GBP">GBP - Britisches Pfund</option>
                <option value="JPY">JPY - Japanischer Yen</option>
                <option value="CAD">CAD - Kanadischer Dollar</option>
                <option value="CHF">CHF - Schweizer Franken</option>
            </select>
            <br>
            <button type="button" id="umrechnen">Umrechnen</button>
            <p id="ergebnis"></p>
        </form>
    </div>
    <script src="umrechnung.js"></script>
</body>
</html>
